<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-light">
  <main class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow border-0" style="max-width: 420px; width: 100%;">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <h1 class="h3 mb-1">Burger Shop</h1>
          <p class="text-muted mb-0">Accedi alla tua area prodotti</p>
        </div>

        <form id="login-form">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input
              type="text"
              class="form-control form-control-lg"
              id="username"
              placeholder="Inserisci username"
              required
            >
          </div>

          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input
              type="password"
              class="form-control form-control-lg"
              id="password"
              placeholder="Inserisci password"
              required
            >
          </div>

          <button type="submit" class="btn btn-primary btn-lg w-100">
            Login
          </button>
        </form>
      </div>
    </div>
  </main>
      <script>
        const loginForm = document.getElementById('login-form');

        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password }),
                });

                if (!response.ok) {
                    throw new Error('Login failed');
                }

                const data = await response.json();

                localStorage.setItem('token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token);
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 3000); // 3 seconds   
            } catch (error) {
                alert('Login non riuscito. Controlla username e password.');
            }
        });
    </script>
</body>

</html>
