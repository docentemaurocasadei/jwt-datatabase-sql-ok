<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body class="bg-light">
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <span class="navbar-brand">Burger Shop</span>
      <a href="products.html" class="btn btn-outline-light btn-sm">Menù</a>
    </div>
  </nav>

  <main class="container">
    <div class="mb-4">
      <h1 class="h3">Dettaglio Prodotto</h1>
      <p class="text-muted">Scheda completa del prodotto selezionato</p>
    </div>

    <div id="product-container" class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0">
          <img
            src=""
            class="card-img-top"
            alt=""
            style="height: 320px; object-fit: cover;"
          >

          <div class="card-body">
            <h5 class="card-title fs-3"></h5>
            <p class="card-description text-muted"></p>
            <p class="card-price fs-4 fw-bold text-primary"></p>

            <a href="products.html" class="btn btn-primary">
              Torna ai prodotti
            </a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="./index.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');

    if (productId) {
      fetchProductDetails(productId);
    }
  </script>
</body>
</html>
