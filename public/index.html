<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body class="bg-light">
  <script>
    if (!localStorage.getItem('token')) {
      window.location.href = 'login.html';
    }
  </script>

  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <span class="navbar-brand">Burger Shop</span>
      <a href="login.html" class="btn btn-outline-light btn-sm">Login</a>
    </div>
  </nav>

  <main class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="h3 mb-0">Lista Prodotti</h1>
    </div>

    <div class="row g-4" id="products-container"></div>
  </main>

  <template id="product-template">
    <div class="col-md-4 col-lg-3">
      <div class="card h-100 shadow-sm">
        <img src="" class="card-img-top" alt="" style="height: 180px; object-fit: cover;">

        <div class="card-body d-flex flex-column">
          <h5 class="card-title"></h5>
          <p class="card-description small text-muted"></p>
          <p class="card-price fw-bold"></p>

          <a href="#" class="btn btn-primary mt-auto">Dettaglio</a>
        </div>
      </div>
    </div>
  </template>

  <script src="./index.js"></script>
  <script>
    fetchProducts();
  </script>
</body>
</html>
